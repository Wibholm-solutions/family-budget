name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run unit tests
        run: pytest tests/

      - name: Run E2E tests
        run: pytest e2e/
        env:
          DISPLAY: ":99"

  deploy:
    if: github.event_name == 'push'
    needs: test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            -t family-budget:${{ github.sha }} \
            -t family-budget:latest \
            .

      - name: Deploy
        run: ~/scripts/deploy.sh family-budget
