services:
  family-budget:
    build: .
    container_name: family-budget
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      # Persist database outside container
      - ./data:/app/data
    environment:
      - TZ=Europe/Copenhagen
      - PYTHONUNBUFFERED=1
      - APP_VERSION=${APP_VERSION}
      # Feedback API (replaces direct GitHub API calls)
      - FEEDBACK_API_URL=${FEEDBACK_API_URL:-http://172.17.0.1:3102}
      - GITHUB_REPO=${GITHUB_REPO:-Wibholm-solutions/family-budget}
      # SMTP via host Postfix relay
      - SMTP_HOST=172.17.0.1
      - SMTP_PORT=25
      - SMTP_FROM=noreply@wibholmsolutions.com
      # Stripe donation links
      - STRIPE_DONATE_10=${STRIPE_DONATE_10}
      - STRIPE_DONATE_25=${STRIPE_DONATE_25}
      - STRIPE_DONATE_50=${STRIPE_DONATE_50}
